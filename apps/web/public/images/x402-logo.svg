<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" fill="none">
  <!-- Stacks-style radiating bars -->
  <g stroke="#2D2D2D" stroke-width="15" stroke-linecap="round">
    <!-- Left horizontal bars -->
    <line x1="15" y1="95" x2="95" y2="95"/>
    <line x1="15" y1="130" x2="95" y2="130"/>
    <line x1="15" y1="165" x2="95" y2="165"/>

    <!-- Right horizontal bars -->
    <line x1="225" y1="95" x2="305" y2="95"/>
    <line x1="225" y1="130" x2="305" y2="130"/>
    <line x1="225" y1="165" x2="305" y2="165"/>

    <!-- Upper-left diagonals -->
    <line x1="60" y1="22" x2="120" y2="92"/>
    <line x1="85" y1="18" x2="138" y2="82"/>

    <!-- Upper-right diagonals -->
    <line x1="260" y1="22" x2="200" y2="92"/>
    <line x1="235" y1="18" x2="182" y2="82"/>

    <!-- Lower-left diagonals -->
    <line x1="60" y1="238" x2="120" y2="168"/>
    <line x1="85" y1="242" x2="138" y2="178"/>

    <!-- Lower-right diagonals -->
    <line x1="260" y1="238" x2="200" y2="168"/>
    <line x1="235" y1="242" x2="182" y2="178"/>
  </g>

  <!-- Center text: x in dark, 402 in orange -->
  <text x="126" y="143" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="46" fill="#2D2D2D" letter-spacing="-1">x</text>
  <text x="155" y="143" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="46" fill="#F97316" letter-spacing="-1">402</text>
</svg>
