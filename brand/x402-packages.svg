<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none">
  <!-- Background -->
  <rect width="1200" height="420" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="60" y="55" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="34" fill="#1A1A2E" letter-spacing="-0.5">x402 Packages</text>
  <text x="60" y="80" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="15" fill="#6B7280">Monorepo structure for the x402 payment ecosystem</text>

  <!-- Logo top-right -->
  <g transform="translate(1060, 10) scale(0.25)">
    <g stroke="#2D2D2D" stroke-width="15" stroke-linecap="round">
      <line x1="15" y1="95" x2="95" y2="95"/>
      <line x1="15" y1="130" x2="95" y2="130"/>
      <line x1="15" y1="165" x2="95" y2="165"/>
      <line x1="225" y1="95" x2="305" y2="95"/>
      <line x1="225" y1="130" x2="305" y2="130"/>
      <line x1="225" y1="165" x2="305" y2="165"/>
      <line x1="60" y1="22" x2="120" y2="92"/>
      <line x1="85" y1="18" x2="138" y2="82"/>
      <line x1="260" y1="22" x2="200" y2="92"/>
      <line x1="235" y1="18" x2="182" y2="82"/>
      <line x1="60" y1="238" x2="120" y2="168"/>
      <line x1="85" y1="242" x2="138" y2="178"/>
      <line x1="260" y1="238" x2="200" y2="168"/>
      <line x1="235" y1="242" x2="182" y2="178"/>
    </g>
    <text x="126" y="143" font-family="'Arial Black', sans-serif" font-weight="900" font-size="46" fill="#2D2D2D" letter-spacing="-1">x</text>
    <text x="155" y="143" font-family="'Arial Black', sans-serif" font-weight="900" font-size="46" fill="#F97316" letter-spacing="-1">402</text>
  </g>

  <!-- ═══ PACKAGE CARDS ═══ -->

  <!-- SDK -->
  <rect x="60" y="110" width="210" height="130" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <rect x="75" y="125" width="50" height="22" rx="4" fill="#F97316"/>
  <text x="100" y="141" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="11" fill="white">SDK</text>
  <text x="75" y="168" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1A1A2E">stackai-x402</text>
  <text x="75" y="186" font-family="ui-monospace, monospace" font-size="11" fill="#9CA3AF">packages/sdk/</text>
  <text x="75" y="210" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">Wallet, payment flows,</text>
  <text x="75" y="226" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">agent management</text>

  <!-- Gateway -->
  <rect x="290" y="110" width="210" height="130" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="305" y="125" width="74" height="22" rx="4" fill="#16A34A"/>
  <text x="342" y="141" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="11" fill="white">GATEWAY</text>
  <text x="305" y="168" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1A1A2E">gateway</text>
  <text x="305" y="186" font-family="ui-monospace, monospace" font-size="11" fill="#9CA3AF">apps/gateway/</text>
  <text x="305" y="210" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">MCP proxy, x402 payment</text>
  <text x="305" y="226" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">enforcement, registry</text>

  <!-- Web -->
  <rect x="520" y="110" width="210" height="130" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="535" y="125" width="44" height="22" rx="4" fill="#3B82F6"/>
  <text x="557" y="141" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="11" fill="white">WEB</text>
  <text x="535" y="168" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1A1A2E">web</text>
  <text x="535" y="186" font-family="ui-monospace, monospace" font-size="11" fill="#9CA3AF">apps/web/</text>
  <text x="535" y="210" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">Marketplace, chat, agent</text>
  <text x="535" y="226" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">composer, analytics</text>

  <!-- Docs -->
  <rect x="750" y="110" width="210" height="130" rx="14" fill="#FAF5FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="765" y="125" width="50" height="22" rx="4" fill="#8B5CF6"/>
  <text x="790" y="141" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="11" fill="white">DOCS</text>
  <text x="765" y="168" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1A1A2E">docs</text>
  <text x="765" y="186" font-family="ui-monospace, monospace" font-size="11" fill="#9CA3AF">apps/docs/</text>
  <text x="765" y="210" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">Nextra documentation</text>
  <text x="765" y="226" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">site with guides + API</text>

  <!-- Moltbook -->
  <rect x="980" y="110" width="160" height="130" rx="14" fill="#FEFCE8" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="995" y="125" width="80" height="22" rx="4" fill="#D97706"/>
  <text x="1035" y="141" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="11" fill="white">MOLTBOOK</text>
  <text x="995" y="168" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#1A1A2E">moltbook</text>
  <text x="995" y="186" font-family="ui-monospace, monospace" font-size="11" fill="#9CA3AF">apps/moltbook/</text>
  <text x="995" y="210" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">Promotional AI</text>
  <text x="995" y="226" font-family="'Inter', sans-serif" font-size="12" fill="#6B7280">agent service</text>

  <!-- ═══ LIVE SERVICES BAR ═══ -->
  <rect x="60" y="270" width="1080" height="130" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <text x="100" y="300" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#6B7280" letter-spacing="1">LIVE SERVICES</text>

  <!-- Dashboard -->
  <rect x="80" y="315" width="240" height="34" rx="8" fill="#FFF7ED"/>
  <circle cx="100" cy="332" r="5" fill="#F97316"/>
  <text x="115" y="337" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#1A1A2E">Dashboard</text>
  <text x="200" y="337" font-family="ui-monospace, monospace" font-size="11" fill="#F97316">x402.stacks-ai.app</text>

  <!-- Gateway -->
  <rect x="80" y="360" width="240" height="34" rx="8" fill="#F0FDF4"/>
  <circle cx="100" cy="377" r="5" fill="#16A34A"/>
  <text x="115" y="382" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#1A1A2E">Gateway</text>
  <text x="188" y="382" font-family="ui-monospace, monospace" font-size="11" fill="#16A34A">gateway.stacks-ai.app</text>

  <!-- Moltbook service -->
  <rect x="370" y="315" width="260" height="34" rx="8" fill="#FEFCE8"/>
  <circle cx="390" cy="332" r="5" fill="#D97706"/>
  <text x="405" y="337" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#1A1A2E">Moltbook</text>
  <text x="485" y="337" font-family="ui-monospace, monospace" font-size="11" fill="#D97706">moltbook.stacks-ai.app</text>

  <!-- Docs -->
  <rect x="370" y="360" width="260" height="34" rx="8" fill="#FAF5FF"/>
  <circle cx="390" cy="377" r="5" fill="#8B5CF6"/>
  <text x="405" y="382" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#1A1A2E">Documentation</text>
  <text x="520" y="382" font-family="ui-monospace, monospace" font-size="11" fill="#8B5CF6">x402-docs.stacks-ai.app</text>

  <!-- GitHub -->
  <rect x="680" y="315" width="340" height="34" rx="8" fill="#F3F4F6"/>
  <circle cx="700" cy="332" r="5" fill="#374151"/>
  <text x="715" y="337" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#1A1A2E">GitHub</text>
  <text x="770" y="337" font-family="ui-monospace, monospace" font-size="11" fill="#374151">github.com/Stack-AI-MCP/stackai-x402</text>
</svg>
