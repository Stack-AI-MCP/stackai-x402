<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" fill="none">
  <!-- Background -->
  <rect width="1200" height="680" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="60" y="65" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38" fill="#1A1A2E" letter-spacing="-0.5">x402 Payment Flow</text>

  <!-- Logo top-right (inline simplified version) -->
  <g transform="translate(1060, 18) scale(0.28)">
    <g stroke="#2D2D2D" stroke-width="15" stroke-linecap="round">
      <line x1="15" y1="95" x2="95" y2="95"/>
      <line x1="15" y1="130" x2="95" y2="130"/>
      <line x1="15" y1="165" x2="95" y2="165"/>
      <line x1="225" y1="95" x2="305" y2="95"/>
      <line x1="225" y1="130" x2="305" y2="130"/>
      <line x1="225" y1="165" x2="305" y2="165"/>
      <line x1="60" y1="22" x2="120" y2="92"/>
      <line x1="85" y1="18" x2="138" y2="82"/>
      <line x1="260" y1="22" x2="200" y2="92"/>
      <line x1="235" y1="18" x2="182" y2="82"/>
      <line x1="60" y1="238" x2="120" y2="168"/>
      <line x1="85" y1="242" x2="138" y2="178"/>
      <line x1="260" y1="238" x2="200" y2="168"/>
      <line x1="235" y1="242" x2="182" y2="178"/>
    </g>
    <text x="126" y="143" font-family="'Arial Black', sans-serif" font-weight="900" font-size="46" fill="#2D2D2D" letter-spacing="-1">x</text>
    <text x="155" y="143" font-family="'Arial Black', sans-serif" font-weight="900" font-size="46" fill="#F97316" letter-spacing="-1">402</text>
  </g>

  <!-- Subtitle -->
  <text x="60" y="95" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="16" fill="#6B7280">HTTP 402 payments for AI agents on Stacks Bitcoin L2</text>

  <!-- ═══ CLIENT BOX ═══ -->
  <rect x="60" y="160" width="240" height="320" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="180" y="200" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#1A1A2E">AI Agent</text>
  <text x="180" y="222" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="13" fill="#9CA3AF">(Consumer)</text>

  <!-- Client steps -->
  <rect x="80" y="245" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="180" y="268" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#374151">1. POST /mcp?id=xxx</text>

  <rect x="80" y="295" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="180" y="318" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#DC2626">2. Receive 402</text>

  <rect x="80" y="345" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="180" y="368" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#374151">3. Sign tx locally</text>

  <rect x="80" y="395" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="180" y="418" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#16A34A">4. Retry + payment</text>

  <rect x="80" y="445" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="180" y="468" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#16A34A">5. Get result</text>

  <!-- ═══ GATEWAY BOX ═══ -->
  <rect x="480" y="160" width="240" height="320" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="600" y="200" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#1A1A2E">x402 Gateway</text>
  <text x="600" y="222" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="13" fill="#9CA3AF">(Payment Proxy)</text>

  <rect x="500" y="245" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="268" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#374151">Check tool price</text>

  <rect x="500" y="295" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="318" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#DC2626">Return 402 + headers</text>

  <rect x="500" y="345" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="368" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#374151">Verify payment</text>

  <rect x="500" y="395" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="418" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#374151">Forward to upstream</text>

  <rect x="500" y="445" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="600" y="468" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#16A34A">Return result</text>

  <!-- ═══ MCP SERVER BOX ═══ -->
  <rect x="900" y="160" width="240" height="200" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="1020" y="200" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#1A1A2E">MCP Server</text>
  <text x="1020" y="222" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="13" fill="#9CA3AF">(Provider)</text>

  <rect x="920" y="245" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1020" y="268" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#374151">Execute tool</text>

  <rect x="920" y="295" width="200" height="36" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1020" y="318" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#374151">Return result</text>

  <!-- ═══ STACKS BOX ═══ -->
  <rect x="900" y="400" width="240" height="80" rx="16" fill="#FAF5FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="1020" y="435" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="18" fill="#1A1A2E">Stacks</text>
  <text x="1020" y="458" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="13" fill="#9CA3AF">Bitcoin L2</text>

  <!-- ═══ ARROWS ═══ -->
  <!-- Client → Gateway -->
  <line x1="300" y1="263" x2="476" y2="263" stroke="#F97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="388" y="256" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#F97316" font-weight="600">Tool Call</text>

  <!-- Gateway → Client (402) -->
  <line x1="476" y1="313" x2="300" y2="313" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>
  <text x="388" y="306" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#DC2626" font-weight="600">402 Required</text>

  <!-- Client → Gateway (retry with payment) -->
  <line x1="300" y1="413" x2="476" y2="413" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="388" y="406" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#16A34A" font-weight="600">Pay (STX/sBTC/USDCx)</text>

  <!-- Gateway → Client (result) -->
  <line x1="476" y1="463" x2="300" y2="463" stroke="#16A34A" stroke-width="2" marker-end="url(#arrowGreen2)"/>
  <text x="388" y="456" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#16A34A" font-weight="600">200 + Result</text>

  <!-- Gateway → MCP Server -->
  <line x1="720" y1="263" x2="896" y2="263" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="808" y="256" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#3B82F6" font-weight="600">Execute</text>

  <!-- MCP Server → Gateway -->
  <line x1="896" y1="313" x2="720" y2="313" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue2)"/>
  <text x="808" y="306" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#3B82F6" font-weight="600">Result</text>

  <!-- Gateway → Stacks -->
  <line x1="720" y1="380" x2="896" y2="430" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowPurple)"/>
  <text x="808" y="395" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#8B5CF6" font-weight="600">Verify on-chain</text>

  <!-- ═══ TOKENS BAR ═══ -->
  <rect x="60" y="540" width="1080" height="80" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <text x="100" y="570" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#6B7280" letter-spacing="1">ACCEPTED TOKENS</text>

  <!-- STX -->
  <rect x="100" y="582" width="70" height="28" rx="14" fill="#F97316" fill-opacity="0.1"/>
  <text x="135" y="601" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#F97316">STX</text>

  <!-- sBTC -->
  <rect x="185" y="582" width="70" height="28" rx="14" fill="#F59E0B" fill-opacity="0.1"/>
  <text x="220" y="601" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#D97706">sBTC</text>

  <!-- USDCx -->
  <rect x="270" y="582" width="80" height="28" rx="14" fill="#3B82F6" fill-opacity="0.1"/>
  <text x="310" y="601" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#2563EB">USDCx</text>

  <!-- Key points -->
  <text x="500" y="572" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#6B7280" letter-spacing="1">KEY FEATURES</text>
  <circle cx="505" cy="597" r="4" fill="#16A34A"/>
  <text x="515" y="601" font-family="'Inter', sans-serif" font-size="13" fill="#374151">Peer-to-peer</text>
  <circle cx="625" cy="597" r="4" fill="#16A34A"/>
  <text x="635" y="601" font-family="'Inter', sans-serif" font-size="13" fill="#374151">Non-intrusive</text>
  <circle cx="755" cy="597" r="4" fill="#16A34A"/>
  <text x="765" y="601" font-family="'Inter', sans-serif" font-size="13" fill="#374151">Bitcoin finality</text>
  <circle cx="895" cy="597" r="4" fill="#16A34A"/>
  <text x="905" y="601" font-family="'Inter', sans-serif" font-size="13" fill="#374151">No code changes</text>

  <!-- ═══ ARROW MARKERS ═══ -->
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#F97316"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#DC2626"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#16A34A"/></marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#16A34A"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#3B82F6"/></marker>
    <marker id="arrowBlue2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#3B82F6"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#8B5CF6"/></marker>
  </defs>
</svg>
